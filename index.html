<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Infinite Chunk FPS World</title>

<style>
body { margin:0; overflow:hidden; background:#87cfff; }

#ui{
position:absolute;
top:10px;
left:10px;
color:white;
font-family:Arial;
background:rgba(0,0,0,0.5);
padding:10px;
z-index:10;
}

#coords{
position:absolute;
bottom:10px;
left:10px;
color:white;
font-family:Arial;
}
</style>
</head>

<body>

<div id="ui">
CLICK = Mouse Lock<br>
WASD Move<br>
Infinite World
</div>

<div id="coords"></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

<script>

// ================= SCENE =================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87cfff);

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 5000);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// LIGHT
scene.add(new THREE.AmbientLight(0xffffff,1.2));
const sun = new THREE.DirectionalLight(0xffffff,2);
sun.position.set(10,20,10);
scene.add(sun);

// ================= PLAYER =================
const player = new THREE.Object3D();
scene.add(player);

camera.position.set(0,1.7,0);
player.add(camera);

// ================= MOUSE LOOK =================
let yaw = 0;
let pitch = 0;

document.body.addEventListener("click",()=>{
document.body.requestPointerLock();
});

document.addEventListener("mousemove",(e)=>{

if(document.pointerLockElement !== document.body) return;

yaw -= e.movementX * 0.002;
pitch -= e.movementY * 0.002;

pitch = Math.max(-1.5, Math.min(1.5, pitch));

camera.rotation.set(pitch,yaw,0);

});

// ================= INPUT =================
const keys = {};

window.addEventListener("keydown",(e)=>keys[e.key.toLowerCase()]=true);
window.addEventListener("keyup",(e)=>keys[e.key.toLowerCase()]=false);

// ================= WORLD =================
const loader = new THREE.GLTFLoader();

const chunkSize = 80;
const renderDistance = 2;

const chunks = new Map();

// house cache
let houseGLB = null;

loader.load("1.glb",(gltf)=>{
houseGLB = gltf.scene;
});

// ================= CHUNK SYSTEM =================
function getChunkKey(x,z){
return `${x},${z}`;
}

function loadChunk(cx,cz){

const key = getChunkKey(cx,cz);
if(chunks.has(key) || !houseGLB) return;

const group = new THREE.Group();

const ground = new THREE.Mesh(
new THREE.PlaneGeometry(chunkSize,chunkSize),
new THREE.MeshStandardMaterial({color:0x2ecc71})
);
ground.rotation.x = -Math.PI/2;
group.add(ground);

// houses
for(let i=0;i<3;i++){

const house = houseGLB.clone();
house.position.set(
Math.random()*chunkSize-chunkSize/2,
0,
Math.random()*chunkSize-chunkSize/2
);

group.add(house);
}

group.position.set(cx*chunkSize,0,cz*chunkSize);

scene.add(group);
chunks.set(key,group);

}

function updateChunks(){

const cx = Math.floor(player.position.x / chunkSize);
const cz = Math.floor(player.position.z / chunkSize);

for(let x=-renderDistance;x<=renderDistance;x++){
for(let z=-renderDistance;z<=renderDistance;z++){
loadChunk(cx+x,cz+z);
}
}

}

// ================= MOVEMENT =================
let speed = 0.15;

function move(){

let dir = new THREE.Vector3();

if(keys["w"]) dir.z -= 1;
if(keys["s"]) dir.z += 1;
if(keys["a"]) dir.x -= 1;
if(keys["d"]) dir.x += 1;

dir.normalize();

const forward = new THREE.Vector3(0,0,-1).applyEuler(camera.rotation);
forward.y = 0;
forward.normalize();

const right = new THREE.Vector3().crossVectors(forward,new THREE.Vector3(0,1,0)).negate();

player.position.addScaledVector(forward, dir.z * speed);
player.position.addScaledVector(right, dir.x * speed);

}

// ================= LOOP =================
function animate(){

requestAnimationFrame(animate);

move();
updateChunks();

document.getElementById("coords").innerHTML =
`X:${player.position.x.toFixed(2)}<br>
Z:${player.position.z.toFixed(2)}`;

renderer.render(scene,camera);

}

animate();

// ================= RESIZE =================
window.addEventListener("resize",()=>{
camera.aspect = innerWidth/innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(innerWidth,innerHeight);
});

</script>

</body>
</html>
